services:
  - type: web
    name: mediconnect-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 1234
      - key: SUPABASE_URL
        sync: false
        required: true
      - key: SUPABASE_ANON_KEY
        sync: false
        required: true
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
        required: true
      - key: JWT_SECRET
        generateValue: true
        required: true