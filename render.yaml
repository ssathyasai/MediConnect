services:
  - type: web
    name: mediconnect-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start

  - type: static
    name: mediconnect-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html