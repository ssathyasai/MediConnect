# render.yaml
# This file configures deployment for both frontend and backend on Render

services:
  # Backend API Service
  - type: web
    name: mediconnect-backend
    runtime: node
    repo: https://github.com/ssathyasai/MediConnect.git    # CHANGE THIS TO YOUR REPO
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: SUPABASE_URL
        sync: false                                 # LEAVE AS IS - add in dashboard
      - key: SUPABASE_ANON_KEY
        sync: false                                 # LEAVE AS IS - add in dashboard
      - key: PORT
        value: 1234
      - key: NODE_ENV
        value: production
    autoDeploy: true
    plan: free

  # Frontend Static Site
  - type: web
    name: mediconnect-frontend
    runtime: static
    repo: https://github.com/ssathyasai/MediConnect.git   # CHANGE THIS TO YOUR REPO
    branch: main
    rootDir: frontend
    buildCommand: echo "No build required"
    staticPublishPath: ./
    pullRequestPreviewsEnabled: true
    envVars:
      - key: REACT_APP_API_URL
        value: https://mediconnect-backend.onrender.com/api
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /components/*
        destination: /components/index.html
      - type: rewrite
        source: /api/*
        destination: https://mediconnect-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
    plan: free