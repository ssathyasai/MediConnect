<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediConnect Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #b6fffa, #8DDFCB);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-form {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-form h1 {
            color: #04364a;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-control {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .btn-login {
            background: #1a7a76;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-login:hover {
            background: #04364a;
        }
        .message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="login-form">
        <h1><i class="fas fa-heartbeat text-primary"></i> MediConnect</h1>
        <h2 class="text-center mb-4">Login</h2>
        
        <form id="loginForm">
            <input type="email" id="email" class="form-control" placeholder="Email" required>
            <input type="password" id="password" class="form-control" placeholder="Password" required>
            <button type="submit" class="btn-login">Login</button>
        </form>
        
        <div id="message" class="message"></div>
        
        <p class="text-center mt-3">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </p>
        <p class="text-center">
            <a href="../main.html">← Back to Home</a>
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            messageDiv.innerHTML = 'Logging in...';
            messageDiv.className = 'message';
            
            try {
                const response = await fetch('http://localhost:1234/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.innerHTML = 'Login successful! Redirecting...';
                    messageDiv.className = 'message success';
                    
                    // Store user data
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userId', data.user.id);
                    localStorage.setItem('userName', data.user.firstName);
                    localStorage.setItem('userEmail', data.user.email);
                    
                    // Redirect
                    setTimeout(() => {
                        window.location.href = '../main.html';
                    }, 1500);
                } else {
                    messageDiv.innerHTML = data.error || 'Login failed';
                    messageDiv.className = 'message error';
                }
            } catch (error) {
                messageDiv.innerHTML = 'Connection error. Please try again.';
                messageDiv.className = 'message error';
                console.error('Error:', error);
            }
        });
    </script>
    <script src="https://kit.fontawesome.com/your-kit.js"></script>
</body>
</html>
