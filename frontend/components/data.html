<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Dashboard - MediConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #b6fffa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background-color: #04364a !important;
        }
        .navbar-brand, .nav-link {
            color: white !important;
        }
        .dashboard-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .health-widget {
            background: linear-gradient(135deg, #fff, #f8f9fa);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        .btn-login {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 8px 25px;
            border-radius: 50px;
            text-decoration: none;
            margin-right: 10px;
        }
        .btn-signup {
            background: #1a7a76;
            border: 2px solid #1a7a76;
            color: white;
            padding: 8px 25px;
            border-radius: 50px;
            text-decoration: none;
        }
        #loginPrompt {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 15px;
            margin: 50px auto;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="../main.html"><i class="fas fa-heartbeat"></i> MediConnect</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../main.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Services</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="mentalhealth.html">Mental Health</a></li>
                            <li><a class="dropdown-item" href="symptom.html">Symptom Checker</a></li>
                            <li><a class="dropdown-item" href="data.html">Health Data</a></li>
                            <li><a class="dropdown-item" href="meal.html">Nutrition Planning</a></li>
                            <li><a class="dropdown-item" href="community.html">Community</a></li>
                        </ul>
                    </li>
                </ul>
                <div class="ms-3">
                    <a href="login.html" class="btn-login">Login</a>
                    <a href="signup.html" class="btn-signup">Sign Up</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="dashboardContent">
            <!-- Content will be loaded dynamically -->
        </div>
    </div>

    <script>
        // Check if user is logged in
        const userId = localStorage.getItem('userId');
        const userName = localStorage.getItem('userName');

        if (!userId) {
            // Show login prompt
            document.getElementById('dashboardContent').innerHTML = `
                <div id="loginPrompt">
                    <i class="fas fa-lock fa-3x text-primary mb-3"></i>
                    <h3>Please Login First</h3>
                    <p>You need to be logged in to track your health data.</p>
                    <a href="login.html" class="btn btn-primary">Go to Login</a>
                </div>
            `;
        } else {
            // Show welcome message and dashboard
            document.getElementById('dashboardContent').innerHTML = `
                <div class="alert alert-success">
                    <i class="fas fa-user-circle"></i> Welcome back, ${userName}!
                </div>
                
                <div class="dashboard-card">
                    <h3>Track Your Health Data</h3>
                    <form id="trackingForm">
                        <div class="row">
                            <div class="col-md-3 mb-3">
                                <label>Weight (kg)</label>
                                <input type="number" class="form-control" id="weight" required>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label>Blood Pressure</label>
                                <input type="text" class="form-control" id="bloodPressure" placeholder="120/80" required>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label>Heart Rate (bpm)</label>
                                <input type="number" class="form-control" id="heartRate" required>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label>Sleep (hours)</label>
                                <input type="text" class="form-control" id="sleepPatterns" placeholder="8 hours" required>
                            </div>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="trackHealthData()">Save Data</button>
                    </form>
                </div>

                <div class="row mt-4">
                    <div class="col-md-3">
                        <div class="health-widget">
                            <h5>Weight</h5>
                            <h3 id="weightValue">-</h3>
                            <p>kg</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="health-widget">
                            <h5>Blood Pressure</h5>
                            <h3 id="bloodPressureValue">-</h3>
                            <p>mmHg</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="health-widget">
                            <h5>Heart Rate</h5>
                            <h3 id="heartRateValue">-</h3>
                            <p>bpm</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="health-widget">
                            <h5>Sleep</h5>
                            <h3 id="sleepPatternsValue">-</h3>
                            <p>hours</p>
                        </div>
                    </div>
                </div>

                <div class="dashboard-card mt-4">
                    <h4>Health History</h4>
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Weight</th>
                                    <th>BP</th>
                                    <th>Heart Rate</th>
                                    <th>Sleep</th>
                                </tr>
                            </thead>
                            <tbody id="healthTableBody"></tbody>
                        </table>
                    </div>
                </div>
            `;

            // Load existing data
            fetchHealthData();
        }

        // Function to fetch health data
        async function fetchHealthData() {
            try {
                const response = await fetch(`https://mediconnect-2p65.onrender.com/api/getHealthData?userId=${userId}`)
                const data = await response.json();
                
                if (data.length > 0) {
                    updateDashboardValues(data);
                    updateHealthTable(data);
                }
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        // Function to track new health data
        async function trackHealthData() {
            const entry = {
                userId: userId,
                weight: document.getElementById('weight').value,
                bloodPressure: document.getElementById('bloodPressure').value,
                heartRate: document.getElementById('heartRate').value,
                sleepPatterns: document.getElementById('sleepPatterns').value
            };

            if (!entry.weight || !entry.bloodPressure || !entry.heartRate || !entry.sleepPatterns) {
                alert('Please fill all fields');
                return;
            }

            try {
                const response = await fetch('http://localhost:1234/api/saveHealthData', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(entry)
                });

                const data = await response.json();
                
                if (response.ok) {
                    alert('Data saved successfully!');
                    document.getElementById('trackingForm').reset();
                    fetchHealthData(); // Refresh data
                }
            } catch (error) {
                console.error('Error saving data:', error);
                alert('Error saving data');
            }
        }

        // Update dashboard values
        function updateDashboardValues(data) {
            const latest = data[0];
            document.getElementById('weightValue').innerText = latest.weight || '-';
            document.getElementById('bloodPressureValue').innerText = latest.bloodPressure || '-';
            document.getElementById('heartRateValue').innerText = latest.heartRate || '-';
            document.getElementById('sleepPatternsValue').innerText = latest.sleepPatterns || '-';
        }

        // Update health table
        function updateHealthTable(data) {
            const tableBody = document.getElementById('healthTableBody');
            tableBody.innerHTML = '';
            
            data.forEach((entry, index) => {
                const row = document.createElement('tr');
                const date = new Date(entry.date).toLocaleDateString();
                row.innerHTML = `
                    <td>${date}</td>
                    <td>${entry.weight}</td>
                    <td>${entry.bloodPressure}</td>
                    <td>${entry.heartRate}</td>
                    <td>${entry.sleepPatterns}</td>
                `;
                tableBody.appendChild(row);
            });
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
