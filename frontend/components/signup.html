<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediConnect Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #b6fffa, #8DDFCB);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .signup-form {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        .signup-form h1 {
            color: #04364a;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-control {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .btn-signup {
            background: #1a7a76;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-signup:hover {
            background: #04364a;
        }
        .message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="signup-form">
        <h1><i class="fas fa-heartbeat text-primary"></i> MediConnect</h1>
        <h2 class="text-center mb-4">Create Account</h2>
        
        <form id="signupForm">
            <div class="row">
                <div class="col-md-6">
                    <input type="text" id="firstName" class="form-control" placeholder="First Name" required>
                </div>
                <div class="col-md-6">
                    <input type="text" id="lastName" class="form-control" placeholder="Last Name" required>
                </div>
            </div>
            <input type="email" id="email" class="form-control" placeholder="Email" required>
            <input type="password" id="password" class="form-control" placeholder="Password" required>
            <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password" required>
            <button type="submit" class="btn-signup">Sign Up</button>
        </form>
        
        <div id="message" class="message"></div>
        
        <p class="text-center mt-3">
            Already have an account? <a href="login.html">Login</a>
        </p>
        <p class="text-center">
            <a href="../main.html">← Back to Home</a>
        </p>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const userData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value
            };
            
            const messageDiv = document.getElementById('message');
            
            if (userData.password !== userData.confirmPassword) {
                messageDiv.innerHTML = 'Passwords do not match!';
                messageDiv.style.color = 'red';
                return;
            }
            
            messageDiv.innerHTML = 'Creating account...';
            
            try {
                const response = await fetch('https://mediconnect-2p65.onrender.com/api/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(userData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.innerHTML = 'Account created successfully! Redirecting to login...';
                    messageDiv.style.color = 'green';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    messageDiv.innerHTML = data.error || 'Signup failed';
                    messageDiv.style.color = 'red';
                }
            } catch (error) {
                messageDiv.innerHTML = 'Connection error. Please try again.';
                messageDiv.style.color = 'red';
                console.error('Error:', error);
            }
        });
    </script>
    <script src="https://kit.fontawesome.com/your-kit.js"></script>
</body>
</html>
